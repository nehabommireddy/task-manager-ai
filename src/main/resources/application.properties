spring.application.name=task-manager

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console (accessible at /h2-console during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# AI configuration — set via environment variable: ANTHROPIC_API_KEY=sk-...
ai.anthropic.api-key=${ANTHROPIC_API_KEY:your-api-key-here}
ai.anthropic.api-url=https://api.anthropic.com/v1/messages
ai.anthropic.model=claude-sonnet-4-20250514

# Logging
logging.level.com.example.taskmanager=DEBUG
