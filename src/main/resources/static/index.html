<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }

    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      gap: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #374151; }

    /* Form */
    .form-row { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: .75rem; }
    input, textarea, select {
      flex: 1;
      min-width: 160px;
      padding: .5rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .9rem;
    }
    textarea { min-height: 72px; resize: vertical; }
    button {
      padding: .5rem 1.25rem;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger  { background: #dc2626; color: white; }
    .btn-danger:hover  { background: #b91c1c; }
    .btn-sm { padding: .35rem .75rem; font-size: .8rem; }

    /* Task list */
    #task-list { display: grid; gap: .75rem; }
    .task-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .75rem;
      padding: .9rem 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fafafa;
    }
    .task-info { flex: 1; }
    .task-title { font-weight: 600; margin-bottom: .25rem; }
    .task-meta { font-size: .8rem; color: #6b7280; }
    .badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 500;
      margin-right: .25rem;
    }
    .badge-todo       { background: #e0e7ff; color: #3730a3; }
    .badge-in_progress{ background: #fef3c7; color: #92400e; }
    .badge-done       { background: #d1fae5; color: #065f46; }
    .badge-low        { background: #f3f4f6; color: #374151; }
    .badge-medium     { background: #e0f2fe; color: #0c4a6e; }
    .badge-high       { background: #fee2e2; color: #991b1b; }

    /* Filters */
    .filters { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .filters select { min-width: 130px; flex: unset; }

    /* AI section */
    #ai-result {
      margin-top: .75rem;
      padding: .75rem;
      background: #f0f9ff;
      border-left: 3px solid #2563eb;
      border-radius: 4px;
      white-space: pre-wrap;
      font-size: .9rem;
      display: none;
    }

    .empty-state { text-align: center; color: #9ca3af; padding: 2rem; }
    #status-msg { font-size: .85rem; color: #6b7280; margin-top: .5rem; }
  </style>
</head>
<body>

<header>
  <h1>📋 Task Manager</h1>
</header>

<main>

  <!-- Create Task -->
  <div class="card">
    <h2>New Task</h2>
    <div class="form-row">
      <input type="text" id="new-title" placeholder="Title *" required />
    </div>
    <div class="form-row">
      <textarea id="new-desc" placeholder="Description (optional)"></textarea>
    </div>
    <div class="form-row">
      <select id="new-priority">
        <option value="LOW">Low priority</option>
        <option value="MEDIUM" selected>Medium priority</option>
        <option value="HIGH">High priority</option>
      </select>
      <input type="date" id="new-due" />
      <button class="btn-primary" onclick="createTask()">Add task</button>
    </div>
    <div id="status-msg"></div>
  </div>

  <!-- Task List -->
  <div class="card">
    <h2>Tasks</h2>
    <div class="filters">
      <select id="filter-status" onchange="loadTasks()">
        <option value="">All statuses</option>
        <option value="TODO">Todo</option>
        <option value="IN_PROGRESS">In progress</option>
        <option value="DONE">Done</option>
      </select>
      <select id="filter-priority" onchange="loadTasks()">
        <option value="">All priorities</option>
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
      </select>
    </div>
    <div id="task-list"><p class="empty-state">Loading tasks…</p></div>
  </div>

  <!-- AI Assist -->
  <div class="card">
    <h2>✨ AI Task Suggestions</h2>
    <div class="form-row">
      <input type="text" id="ai-prompt" placeholder="Describe a goal, e.g. 'Plan a product launch'" />
      <button class="btn-primary" onclick="askAi()">Suggest</button>
    </div>
    <div id="ai-result"></div>
  </div>

</main>

<script>
  const API = '/api';

  // ── Load tasks ────────────────────────────────────────────────────────────
  async function loadTasks() {
    const status   = document.getElementById('filter-status').value;
    const priority = document.getElementById('filter-priority').value;
    const params   = new URLSearchParams();
    if (status)   params.append('status', status);
    if (priority) params.append('priority', priority);

    const res   = await fetch(`${API}/tasks?${params}`);
    const tasks = await res.json();
    renderTasks(tasks);
  }

  function renderTasks(tasks) {
    const container = document.getElementById('task-list');
    if (!tasks.length) {
      container.innerHTML = '<p class="empty-state">No tasks found.</p>';
      return;
    }
    container.innerHTML = tasks.map(t => `
      <div class="task-item" id="task-${t.id}">
        <div class="task-info">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.description ? `<div class="task-meta" style="margin-bottom:.25rem">${escHtml(t.description)}</div>` : ''}
          <div>
            <span class="badge badge-${t.status.toLowerCase()}">${fmt(t.status)}</span>
            <span class="badge badge-${t.priority.toLowerCase()}">${fmt(t.priority)}</span>
            ${t.dueDate ? `<span class="badge" style="background:#f3f4f6;color:#374151">Due ${t.dueDate}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:.4rem;align-items:center;flex-shrink:0">
          <select class="btn-sm" onchange="updateStatus(${t.id}, this.value)" style="border:1px solid #d1d5db;border-radius:6px;padding:.3rem .5rem;font-size:.8rem">
            ${['TODO','IN_PROGRESS','DONE'].map(s =>
              `<option value="${s}" ${s === t.status ? 'selected' : ''}>${fmt(s)}</option>`).join('')}
          </select>
          <button class="btn-danger btn-sm" onclick="deleteTask(${t.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  // ── Create task ───────────────────────────────────────────────────────────
  async function createTask() {
    const title = document.getElementById('new-title').value.trim();
    if (!title) { setStatus('Title is required.', 'red'); return; }

    const body = {
      title,
      description: document.getElementById('new-desc').value.trim() || null,
      priority:    document.getElementById('new-priority').value,
      dueDate:     document.getElementById('new-due').value || null,
    };

    const res = await fetch(`${API}/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (res.ok) {
      document.getElementById('new-title').value = '';
      document.getElementById('new-desc').value  = '';
      document.getElementById('new-due').value   = '';
      setStatus('Task created!', 'green');
      loadTasks();
    } else {
      const err = await res.json();
      setStatus(err.message || 'Error creating task.', 'red');
    }
  }

  // ── Update status ─────────────────────────────────────────────────────────
  async function updateStatus(id, status) {
    await fetch(`${API}/tasks/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    loadTasks();
  }

  // ── Delete task ───────────────────────────────────────────────────────────
  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
    loadTasks();
  }

  // ── AI ────────────────────────────────────────────────────────────────────
  async function askAi() {
    const prompt  = document.getElementById('ai-prompt').value.trim();
    const resultEl = document.getElementById('ai-result');
    if (!prompt) return;

    resultEl.style.display = 'block';
    resultEl.textContent   = 'Thinking…';

    const res = await fetch(`${API}/ai/suggest`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    if (res.ok) {
      const data = await res.json();
      resultEl.textContent = data.suggestion;
    } else {
      resultEl.textContent = 'Error calling AI. Check your API key in application.properties.';
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(msg, color) {
    const el = document.getElementById('status-msg');
    el.textContent  = msg;
    el.style.color  = color === 'green' ? '#059669' : '#dc2626';
    setTimeout(() => { el.textContent = ''; }, 3000);
  }

  function fmt(s)    { return s.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase()); }
  function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadTasks();
</script>
</body>
</html>
