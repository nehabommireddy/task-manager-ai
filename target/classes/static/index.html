<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
    }

    header {
      background: #1d4ed8;
      color: white;
      padding: .9rem 2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -.01em; }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      gap: 1.25rem;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }
    .card-title {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #6b7280;
      margin-bottom: 1rem;
    }

    .row { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: .6rem; }

    input[type="text"], input[type="date"], textarea, select {
      flex: 1;
      min-width: 140px;
      padding: .45rem .7rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .875rem;
      font-family: inherit;
      color: inherit;
      background: white;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }
    textarea { min-height: 68px; resize: vertical; }

    button {
      padding: .45rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: .875rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-danger  { background: #dc2626; color: white; }
    .btn-danger:hover:not(:disabled)  { background: #b91c1c; }
    .btn-sm { padding: .3rem .65rem; font-size: .8rem; }

    .feedback { font-size: .8rem; margin-top: .5rem; min-height: 1.2em; }
    .feedback.ok  { color: #059669; }
    .feedback.err { color: #dc2626; }

    .filters { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .9rem; }
    .filters select { flex: unset; min-width: 130px; }

    #task-list { display: grid; gap: .6rem; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      padding: .8rem 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fafafa;
    }
    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-weight: 600;
      font-size: .9rem;
      margin-bottom: .3rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .task-desc {
      font-size: .8rem;
      color: #4b5563;
      margin-bottom: .35rem;
      word-break: break-word;
    }
    .task-actions {
      display: flex;
      gap: .4rem;
      align-items: center;
      flex-shrink: 0;
    }
    .task-actions select {
      flex: unset;
      min-width: unset;
      font-size: .78rem;
      padding: .25rem .4rem;
    }

    .badge {
      display: inline-block;
      padding: .1rem .45rem;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 500;
      margin-right: .2rem;
    }
    .badge-todo        { background: #e0e7ff; color: #3730a3; }
    .badge-in_progress { background: #fef3c7; color: #92400e; }
    .badge-done        { background: #d1fae5; color: #065f46; }
    .badge-low         { background: #f3f4f6; color: #374151; }
    .badge-medium      { background: #e0f2fe; color: #0c4a6e; }
    .badge-high        { background: #fee2e2; color: #991b1b; }
    .badge-due         { background: #f3f4f6; color: #374151; }

    .empty-state { text-align: center; color: #9ca3af; padding: 2.5rem 1rem; font-size: .875rem; }
    .error-state { text-align: center; color: #dc2626; padding: 1.5rem 1rem; font-size: .875rem; }

    #ai-result { margin-top: .9rem; display: none; }

    .ai-loading { color: #6b7280; font-size: .875rem; font-style: italic; }

    .suggestion-item {
      padding: .75rem 1rem;
      border: 1px solid #bfdbfe;
      border-left: 3px solid #3b82f6;
      border-radius: 6px;
      background: #eff6ff;
      margin-bottom: .5rem;
    }
    .suggestion-item:last-child { margin-bottom: 0; }
    .suggestion-header { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }
    .suggestion-title { font-weight: 600; font-size: .875rem; margin-bottom: .2rem; color: #1e3a8a; }
    .suggestion-reason { font-size: .8rem; color: #3730a3; line-height: 1.4; }

    .btn-import {
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      padding: .2rem .55rem;
      font-size: .75rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .btn-import:hover:not(:disabled) { background: #bfdbfe; }

    .ai-error {
      color: #dc2626;
      font-size: .875rem;
      padding: .6rem .75rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>📋 Task Manager</h1>
</header>

<main>

  <!-- Create task -->
  <div class="card">
    <div class="card-title">New Task</div>
    <div class="row">
      <input type="text" id="new-title" placeholder="Title *" maxlength="255" />
    </div>
    <div class="row">
      <textarea id="new-desc" placeholder="Description (optional)" maxlength="2000"></textarea>
    </div>
    <div class="row">
      <select id="new-priority">
        <option value="LOW">Low priority</option>
        <option value="MEDIUM" selected>Medium priority</option>
        <option value="HIGH">High priority</option>
      </select>
      <input type="date" id="new-due" />
      <button id="btn-create" class="btn-primary" onclick="createTask()">Add task</button>
    </div>
    <div id="create-feedback" class="feedback"></div>
  </div>

  <!-- Task list -->
  <div class="card">
    <div class="card-title">Tasks</div>
    <div class="filters">
      <select id="filter-status" onchange="loadTasks()">
        <option value="">All statuses</option>
        <option value="TODO">Todo</option>
        <option value="IN_PROGRESS">In progress</option>
        <option value="DONE">Done</option>
      </select>
      <select id="filter-priority" onchange="loadTasks()">
        <option value="">All priorities</option>
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
      </select>
    </div>
    <div id="task-list"><p class="empty-state">Loading…</p></div>
  </div>

  <!-- AI suggestions -->
  <div class="card">
    <div class="card-title">✨ AI Task Suggestions</div>
    <div class="row">
      <input type="text" id="ai-prompt"
             placeholder="Describe a goal — e.g. 'Plan a product launch for Q4'"
             maxlength="1000" />
      <button id="btn-suggest" class="btn-primary" onclick="getSuggestions()">Suggest</button>
    </div>
    <div id="ai-result"></div>
  </div>

</main>

<script>
'use strict';

const API = '/api';

// ── Task list ────────────────────────────────────────────────────────────────

async function loadTasks() {
  const status   = val('filter-status');
  const priority = val('filter-priority');
  const params   = new URLSearchParams();
  if (status)   params.append('status',   status);
  if (priority) params.append('priority', priority);

  const container = el('task-list');

  try {
    const res = await fetch(`${API}/tasks?${params}`);
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    renderTasks(await res.json(), container);
  } catch {
    container.innerHTML = `<p class="error-state">Could not load tasks. Is the server running?</p>`;
  }
}

function renderTasks(tasks, container) {
  if (!tasks.length) {
    container.innerHTML = '<p class="empty-state">No tasks yet. Add one above.</p>';
    return;
  }
  container.innerHTML = tasks.map(t => `
    <div class="task-item" id="task-${t.id}">
      <div class="task-body">
        <div class="task-title" title="${esc(t.title)}">${esc(t.title)}</div>
        ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
        <div>
          <span class="badge badge-${t.status.toLowerCase()}">${fmt(t.status)}</span>
          <span class="badge badge-${t.priority.toLowerCase()}">${fmt(t.priority)}</span>
          ${t.dueDate ? `<span class="badge badge-due">Due&nbsp;${esc(t.dueDate)}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <select onchange="updateStatus(${t.id}, this)">
          ${['TODO','IN_PROGRESS','DONE'].map(s =>
            `<option value="${s}"${s === t.status ? ' selected' : ''}>${fmt(s)}</option>`
          ).join('')}
        </select>
        <button class="btn-danger btn-sm" onclick="deleteTask(${t.id}, this)">Delete</button>
      </div>
    </div>
  `).join('');
}

// ── Create task ──────────────────────────────────────────────────────────────

async function createTask() {
  const title = val('new-title').trim();
  if (!title) { feedback('create-feedback', 'Title is required.', false); return; }

  const btn = el('btn-create');
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/tasks`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title,
        description: val('new-desc').trim() || null,
        priority:    val('new-priority'),
        dueDate:     val('new-due') || null,
      }),
    });

    if (res.ok) {
      el('new-title').value    = '';
      el('new-desc').value     = '';
      el('new-priority').value = 'MEDIUM';
      el('new-due').value      = '';
      feedback('create-feedback', 'Task created.', true);
      await loadTasks();
    } else {
      const err = await res.json();
      // Validation errors have a field map in err.errors; other errors use err.message
      const msg = err.errors
        ? Object.values(err.errors).join(' · ')
        : (err.message || 'Could not create task.');
      feedback('create-feedback', msg, false);
    }
  } catch {
    feedback('create-feedback', 'Network error — is the server running?', false);
  } finally {
    btn.disabled = false;
  }
}

// ── Update status ────────────────────────────────────────────────────────────

async function updateStatus(id, selectEl) {
  // Disable while in-flight to prevent a second change racing the first
  selectEl.disabled = true;
  try {
    const res = await fetch(`${API}/tasks/${id}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ status: selectEl.value }),
    });
    if (!res.ok) await loadTasks();   // revert to real server state on failure
  } catch {
    await loadTasks();
  } finally {
    selectEl.disabled = false;
  }
}

// ── Delete task ──────────────────────────────────────────────────────────────

async function deleteTask(id, btn) {
  if (!confirm('Delete this task?')) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
    if (res.ok || res.status === 404) {
      // Remove row immediately — snappier than a full reload
      el(`task-${id}`)?.remove();
      if (!el('task-list').querySelector('.task-item')) {
        el('task-list').innerHTML = '<p class="empty-state">No tasks yet. Add one above.</p>';
      }
    }
  } catch {
    btn.disabled = false;
  }
}

// ── AI suggestions ────────────────────────────────────────────────────────────

async function getSuggestions() {
  const prompt = val('ai-prompt').trim();
  if (!prompt) return;

  const result = el('ai-result');
  const btn    = el('btn-suggest');

  result.style.display = 'block';
  result.innerHTML     = '<p class="ai-loading">Thinking…</p>';
  btn.disabled         = true;

  try {
    const res = await fetch(`${API}/tasks/suggest`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ prompt }),
    });

    if (res.ok) {
      renderSuggestions((await res.json()).suggestions, result);
    } else {
      const err = await res.json().catch(() => ({}));
      result.innerHTML = `<div class="ai-error">${
        esc(err.message || 'The AI service returned an unexpected error. Please try again.')
      }</div>`;
    }
  } catch {
    result.innerHTML = '<div class="ai-error">Network error — is the server running?</div>';
  } finally {
    btn.disabled = false;
  }
}

/*
 * Renders each suggestion as its own card with an Import button.
 * The structured response ({ suggestions: [{title, reason}] }) makes
 * this possible — a raw text blob couldn't support per-item actions.
 */
function renderSuggestions(suggestions, container) {
  if (!suggestions || !suggestions.length) {
    container.innerHTML = '<div class="ai-error">No suggestions returned.</div>';
    return;
  }
  container.innerHTML = suggestions.map(s => `
    <div class="suggestion-item">
      <div class="suggestion-header">
        <div class="suggestion-title">${esc(s.title)}</div>
        <button class="btn-import" onclick="importSuggestion(this)">+ Import</button>
      </div>
      ${s.reason ? `<div class="suggestion-reason">${esc(s.reason)}</div>` : ''}
    </div>
  `).join('');

  // Attach the title as a data attribute so importSuggestion can read it
  // without eval or JSON.stringify-in-HTML, which risks XSS
  container.querySelectorAll('.suggestion-item').forEach((item, i) => {
    item.querySelector('.btn-import').dataset.title = suggestions[i].title;
  });
}

/*
 * Pre-fills the create form with the suggestion title.
 * User reviews and adjusts before saving — AI output is never auto-submitted.
 */
function importSuggestion(btn) {
  const title = btn.dataset.title;
  el('new-title').value = title;
  el('new-title').focus();
  el('new-title').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmt(s) {
  return String(s).replace(/_/g, ' ').toLowerCase()
    .replace(/\b\w/g, c => c.toUpperCase());
}

function el(id)  { return document.getElementById(id); }
function val(id) { return el(id).value; }

function feedback(id, msg, ok) {
  const node = el(id);
  node.textContent = msg;
  node.className   = `feedback ${ok ? 'ok' : 'err'}`;
  clearTimeout(node._t);
  node._t = setTimeout(() => { node.textContent = ''; node.className = 'feedback'; }, 4000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadTasks();
</script>
</body>
</html>
